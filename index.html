<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Ultra</title>

<style>
body {font-family: Arial; background:#fff5f7; margin:0;}
header {background:#e91e63; color:white; padding:15px; text-align:center;}
.container {padding:15px;}
.card {background:white; padding:12px; border-radius:12px; margin-bottom:12px;}
button {background:#e91e63;color:white;border:none;padding:6px 10px;border-radius:8px;margin-top:5px;}
input {width:60px;}
.timer {text-align:center;font-size:18px;}
</style>
</head>

<body>

<header>💖 Treino Ultra</header>

<div class="container" id="home"></div>
<div class="container" id="treino" style="display:none;"></div>
<div class="container" id="historico" style="display:none;"></div>

<script>

const treinos=[
{nome:"Peito",cardio:true,ex:[
{n:"Supino",s:4,g:"https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Bench-Press.gif"},
{n:"Inclinado",s:4,g:"https://fitnessprogramer.com/wp-content/uploads/2021/02/Incline-Dumbbell-Press.gif"}]},
{nome:"Posterior",cardio:false,ex:[
{n:"Stiff",s:4,g:"https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Romanian-Deadlift.gif"}]}
];

let tempo=0,interval;

function salvar(d){localStorage.setItem("treino",JSON.stringify(d))}
function carregar(){return JSON.parse(localStorage.getItem("treino")||"{}")}

function iniciar(i){
document.getElementById("home").style.display="none";
const tela=document.getElementById("treino");
tela.style.display="block";

tempo=0;
interval=setInterval(()=>{
tempo++;
document.getElementById("tempo").innerText=tempo+"s";
},1000);

let data=carregar();

let html=`<div class="timer">⏱ <span id="tempo">0s</span></div>`;

if(treinos[i].cardio){html+=`<div class="card">🔥 Cardio 15min</div>`}

html+=`<div class="card">
💊
<button onclick="sup('whey')">Whey</button>
<button onclick="sup('creatina')">Creatina</button>
</div>`;

treinos[i].ex.forEach((e,idx)=>{
let val=data[e.n]?.kg||"";
let done=data[e.n]?.done||0;

html+=`
<div class="card">
<img src="${e.g}" width="100%">
<b>${e.n}</b><br>
<span id="c${idx}">${done}/${e.s}</span><br>
<input value="${val}" onchange="kg('${e.n}',this.value)"><br>
<button onclick="serie(${idx},${e.s},'${e.n}')">Série</button>
</div>`;
});

html+=`<div id="rest"></div><button onclick="finalizar()">Finalizar</button>`;

tela.innerHTML=html;
}

function kg(n,v){
let d=carregar(); if(!d[n]) d[n]={};
d[n].kg=v; salvar(d);
}

function serie(i,total,n){
let el=document.getElementById("c"+i);
let atual=parseInt(el.innerText.split("/")[0]);

if(atual<total){
atual++;
el.innerText=atual+"/"+total;

let d=carregar(); if(!d[n]) d[n]={};
d[n].done=atual; salvar(d);

descanso();
}
}

function descanso(){
let t=60;
let el=document.getElementById("rest");

let r=setInterval(()=>{
if(t<=0){clearInterval(r); el.innerText="🔥 Bora!"; return;}
el.innerText="Descanso "+t+"s";
t--;
},1000);
}

function sup(nome){
let d=carregar();
d[nome]=true;
salvar(d);
alert(nome+" tomado 💊");
}

function finalizar(){
clearInterval(interval);

let hist=JSON.parse(localStorage.getItem("hist")||"[]");
hist.push({data:new Date().toLocaleDateString(),tempo});
localStorage.setItem("hist",JSON.stringify(hist));

document.getElementById("treino").style.display="none";
document.getElementById("home").style.display="block";
}

function verHistorico(){
document.getElementById("home").style.display="none";
const h=document.getElementById("historico");
h.style.display="block";

let hist=JSON.parse(localStorage.getItem("hist")||"[]");

let html="<h3>📊 Histórico</h3>";

hist.forEach(hh=>{
html+=`<div class="card">${hh.data} - ${hh.tempo}s</div>`;
});

html+=`<button onclick="voltar()">Voltar</button>`;

h.innerHTML=html;
}

function voltar(){
document.getElementById("historico").style.display="none";
document.getElementById("home").style.display="block";
}

function render(){
const home=document.getElementById("home");

home.innerHTML=`
<button onclick="verHistorico()">📊 Histórico</button>
`;

treinos.forEach((t,i)=>{
home.innerHTML+=`
<div class="card">
<b>${t.nome}</b><br>
<button onclick="iniciar(${i})">Treinar</button>
</div>`;
});
}

render();

</script>

</body>
</html>
